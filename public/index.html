<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KareApp – Gestion des dépenses</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>💸 KareApp</h1>
    <p>Gérez vos dépenses simplement</p>
  </header>

  <main>

    <!-- Formulaire d'ajout / édition -->
    <section class="card" id="form-section">
      <h2 id="form-title">Ajouter une dépense</h2>
      <form id="expense-form">
        <input type="hidden" id="expense-id" />

        <div class="form-group">
          <label for="label">Libellé</label>
          <input type="text" id="label" placeholder="Ex: Courses Lidl" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="amount">Montant (€)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>

        <div class="form-group">
          <label for="category">Catégorie</label>
          <select id="category" required>
            <option value="">-- Choisir --</option>
            <option value="alimentation">🍎 Alimentation</option>
            <option value="transport">🚗 Transport</option>
            <option value="logement">🏠 Logement</option>
            <option value="sante">💊 Santé</option>
            <option value="loisirs">🎮 Loisirs</option>
            <option value="autre">📦 Autre</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Ajouter</button>
          <button type="button" id="cancel-btn" class="btn-secondary hidden">Annuler</button>
        </div>

        <p id="form-error" class="error hidden"></p>
      </form>
    </section>

    <!-- Tableau des dépenses -->
    <section class="card" id="list-section">
      <div class="list-header">
        <h2>Mes dépenses</h2>
        <span id="total-badge">Total : 0.00 €</span>
      </div>

      <div id="loading" class="info">Chargement…</div>
      <div id="empty" class="info hidden">Aucune dépense enregistrée.</div>

      <table id="expenses-table" class="hidden">
        <thead>
          <tr>
            <th>Date</th>
            <th>Libellé</th>
            <th>Catégorie</th>
            <th>Montant</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenses-body"></tbody>
      </table>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
