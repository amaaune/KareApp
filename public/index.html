<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KareApp – Gestion des dépenses</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>💸 KareApp</h1>
    <p>Gérez vos dépenses simplement</p>
  </header>

  <main>

    <!-- Formulaire d'ajout / édition -->
    <section class="card" id="form-section">
      <h2 id="form-title">Ajouter une dépense</h2>
      <form id="expense-form">
        <input type="hidden" id="expense-id" />

        <div class="form-group">
          <label for="description">Libellé</label>
          <input type="text" id="description" placeholder="Ex: Courses Lidl" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="amount">Montant (€)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>

        <div class="form-group">
          <label for="category">Catégorie</label>
          <select id="category" required>
            <option value="">-- Choisir --</option>
            <option value="alimentaire">🍎 Alimentaire</option>
            <option value="transport">🚗 Transport</option>
            <option value="loisirs">🎮 Loisirs</option>
            <option value="autre">📦 Autre</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Ajouter</button>
          <button type="button" id="cancel-btn" class="btn-secondary hidden">Annuler</button>
        </div>

        <p id="form-error" class="error hidden"></p>
      </form>
    </section>

    <!-- Totaux par catégorie -->
    <section class="card" id="totals-section">
      <h2>Totaux par catégorie</h2>
      <div id="totals-grid"></div>
    </section>

    <!-- Tableau des dépenses -->
    <section class="card" id="list-section">
      <div class="list-header">
        <h2>Mes dépenses</h2>
        <span id="total-badge">Total : 0.00 €</span>
      </div>

      <!-- Filtre par catégorie -->
      <div id="filter-bar">
        <button class="filter-btn active" data-cat="">Toutes</button>
        <button class="filter-btn" data-cat="alimentaire">🍎 Alimentaire</button>
        <button class="filter-btn" data-cat="transport">🚗 Transport</button>
        <button class="filter-btn" data-cat="loisirs">🎮 Loisirs</button>
        <button class="filter-btn" data-cat="autre">📦 Autre</button>
      </div>

      <div id="loading" class="info">Chargement…</div>
      <div id="empty" class="info hidden">Aucune dépense pour ce filtre.</div>

      <table id="expenses-table" class="hidden">
        <thead>
          <tr>
            <th>Date</th>
            <th>Libellé</th>
            <th>Catégorie</th>
            <th>Montant</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenses-body"></tbody>
      </table>
    </section>

  </main>

  <!-- Confirmation modal -->
  <div id="modal-overlay" class="hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="Fermer">×</button>
      <h3 id="modal-title">Confirmer la suppression</h3>
      <p id="modal-body">Voulez-vous supprimer cette dépense ?</p>
      <div class="modal-actions">
        <button id="modal-confirm" class="btn-danger">Supprimer</button>
        <button id="modal-cancel" class="btn-secondary">Annuler</button>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
